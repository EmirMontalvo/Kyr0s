<div class="branches-container">
    <div class="header">
        <h2>Gestión de Sucursales</h2>
        <button mat-raised-button color="primary" (click)="openDialog()">
            <mat-icon>add</mat-icon>
            Nueva Sucursal
        </button>
    </div>

    <div class="loading-container" *ngIf="loading">
        <video autoplay loop [muted]="true" playsinline>
            <source src="assets/loading.mp4" type="video/mp4">
        </video>
    </div>

    <div class="cards-grid" *ngIf="!loading">
        <mat-card *ngFor="let sucursal of dataSource" class="branch-card">
            <div class="card-image">
                <img *ngIf="sucursal.imagen_url" [src]="sucursal.imagen_url" [alt]="sucursal.nombre">
                <div *ngIf="!sucursal.imagen_url" class="no-image">
                    <mat-icon>storefront</mat-icon>
                </div>
            </div>
            <mat-card-content>
                <h3 class="branch-name">{{ sucursal.nombre }}</h3>
                <div class="branch-details">
                    <p class="detail-item">
                        <mat-icon inline>location_on</mat-icon>
                        {{ sucursal.direccion || 'Sin dirección' }}
                    </p>
                    <p class="detail-item">
                        <mat-icon inline>phone</mat-icon>
                        {{ sucursal.telefono || 'Sin teléfono' }}
                    </p>
                </div>
            </mat-card-content>
            <mat-card-actions>
                <button mat-icon-button color="accent" (click)="openHoursDialog(sucursal)" matTooltip="Horarios">
                    <mat-icon>schedule</mat-icon>
                </button>
                <button mat-icon-button color="primary" (click)="openDialog(sucursal)" matTooltip="Editar">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="deleteBranch(sucursal)" matTooltip="Eliminar">
                    <mat-icon>delete</mat-icon>
                </button>
            </mat-card-actions>
        </mat-card>

        <div class="empty-state" *ngIf="dataSource.length === 0">
            <mat-icon>store</mat-icon>
            <p>No hay sucursales registradas</p>
        </div>
    </div>
</div>
