<div class="dialog-header">
    <h2 mat-dialog-title>{{ isEdit ? 'Editar' : 'Nuevo' }} Empleado</h2>
    <button mat-icon-button mat-dialog-close>
        <mat-icon>close</mat-icon>
    </button>
</div>
<mat-dialog-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <!-- Image Upload Section -->
        <div class="image-upload-section">
            <label class="upload-label">Foto del Empleado (opcional)</label>
            <div class="upload-area" (click)="fileInput.click()" [class.has-image]="imagePreview">
                <img *ngIf="imagePreview" [src]="imagePreview" alt="Preview" class="image-preview">
                <div *ngIf="!imagePreview" class="upload-placeholder">
                    <mat-icon>cloud_upload</mat-icon>
                    <span>Haz clic para subir una foto</span>
                </div>
                <input #fileInput type="file" accept="image/*" (change)="onFileSelected($event)" hidden>
            </div>
            <button *ngIf="imagePreview" mat-button color="warn" type="button" (click)="removeImage()"
                class="remove-btn">
                <mat-icon>delete</mat-icon>
                Eliminar foto
            </button>
            <mat-progress-bar *ngIf="uploading" mode="indeterminate"></mat-progress-bar>
        </div>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Nombre Completo</mat-label>
            <input matInput formControlName="nombre" placeholder="Ej: Juan Pérez">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Especialidad</mat-label>
            <input matInput formControlName="especialidad" placeholder="Ej: Cortes clásicos, Barba">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width" *ngIf="!isBranchUser">
            <mat-label>Sucursal</mat-label>
            <mat-select formControlName="sucursal_id">
                <mat-option *ngFor="let s of sucursales" [value]="s.id">
                    {{s.nombre}}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Servicios que realiza</mat-label>
            <mat-select formControlName="servicios_ids" multiple>
                <mat-option *ngFor="let s of servicios" [value]="s.id">
                    {{s.nombre}}
                </mat-option>
            </mat-select>
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancelar</button>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading || form.invalid">
        {{ loading ? 'Guardando...' : 'Guardar' }}
    </button>
</mat-dialog-actions>
