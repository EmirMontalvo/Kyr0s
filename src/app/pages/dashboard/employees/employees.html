<div class="employees-container">
    <div class="header">
        <h2>Gestión de Empleados</h2>
        <button mat-raised-button color="primary" (click)="openDialog()">
            <mat-icon>add</mat-icon>
            Nuevo Empleado
        </button>
    </div>

    <div class="loading-container" *ngIf="loading">
        <video autoplay loop [muted]="true" playsinline>
            <source src="assets/loading.mp4" type="video/mp4">
        </video>
    </div>

    <div class="cards-grid" *ngIf="!loading">
        <mat-card *ngFor="let empleado of dataSource" class="employee-card">
            <div class="card-image">
                <img *ngIf="empleado.imagen_url" [src]="empleado.imagen_url" [alt]="empleado.nombre">
                <div *ngIf="!empleado.imagen_url" class="no-image">
                    <mat-icon>person</mat-icon>
                </div>
            </div>
            <mat-card-content>
                <h3 class="employee-name">{{ empleado.nombre }}</h3>
                <div class="employee-details">
                    <span class="specialty">
                        <mat-icon inline>content_cut</mat-icon>
                        {{ empleado.especialidad }}
                    </span>
                </div>
                <p class="employee-branch">
                    <mat-icon inline>store</mat-icon>
                    {{ empleado.sucursal_nombre }}
                </p>
            </mat-card-content>
            <mat-card-actions>
                <button mat-icon-button color="primary" (click)="openDialog(empleado)" matTooltip="Editar">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="deleteEmployee(empleado)" matTooltip="Eliminar">
                    <mat-icon>delete</mat-icon>
                </button>
            </mat-card-actions>
        </mat-card>

        <div class="empty-state" *ngIf="dataSource.length === 0">
            <mat-icon>people</mat-icon>
            <p>No hay empleados registrados</p>
        </div>
    </div>
</div>
